services:

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
    - MINIO_ROOT_USER=minioadmin
    - MINIO_ROOT_PASSWORD=minioadmin
    - MINIO_ACCESS_KEY=minioadmin
    - MINIO_SECRET_ACCESS_KEY=minioadmin
    - MINIO-BUCKET=burnout
    command: server --console-address ":9001" /data
    restart: always
    volumes:
    - minio_storage:/data

volumes:
  minio_storage:
